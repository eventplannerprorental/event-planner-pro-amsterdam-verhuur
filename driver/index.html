<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b74d1">
  <title>Bezorger Amsterdam verhuur</title>
  <link rel="manifest" href="manifest.json?v=320">
  <link rel="stylesheet" href="driver.css?v=320">
</head>
<body>
  <header class="hero">
    <h1>Bezorger Amsterdam verhuur</h1>
    <p>Mobiele opdrachten</p>
  </header>

  <main class="wrap">
    <div id="status" class="status">App laden...</div>

    <section id="loginCard" class="card">
      <h2>Inloggen</h2>
      <p id="loginHelp" class="muted">Kies je naam eenmalig en vul je persoonlijke PIN in.</p>

      <div id="nameBlock" class="field-block">
        <label for="driverSelect">Naam</label>
        <select id="driverSelect">
          <option value="">Laden...</option>
        </select>
        <small>Na inloggen blijft deze telefoon/browser vast gekoppeld aan deze naam.</small>
      </div>

      <div id="lockedBlock" class="locked hidden">
        <span>Gekoppelde bezorger</span>
        <strong id="lockedName">-</strong>
        <button id="resetDeviceBtn" type="button" class="link-btn">Koppeling wissen</button>
      </div>

      <label for="pinInput">PIN</label>
      <input id="pinInput" type="password" inputmode="numeric" autocomplete="one-time-code" placeholder="PIN" maxlength="8">
      <button id="loginBtn" type="button" class="primary">Inloggen</button>
      <div id="loginError" class="error hidden"></div>
    </section>

    <section id="ordersCard" class="card hidden">
      <div class="toprow">
        <div>
          <h2>Mijn opdrachten</h2>
          <p class="muted" id="driverInfo">-</p>
        </div>
        <button id="logoutBtn" type="button" class="secondary">Uitloggen</button>
      </div>
      <div id="ordersList" class="orders"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="driver.js?v=320"></script>
</body>
</html>
